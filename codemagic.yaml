workflows:
  ios-testflight:
    name: iOS TestFlight Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Create this in Codemagic: Teams > Integrations > App Store Connect.
      # The name must match the integration name set in the Codemagic UI.
      app_store_connect: ideawellness
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ideawellness.app
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set build number
        script: |
          # Auto-increments build number using the latest TestFlight build.
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          echo "Using build number $BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment and set your tester group names to auto-notify external testers:
        # beta_groups:
        #   - Beta Testers
      email:
        recipients:
          - hossam.adel2024@gmail.com
        notify:
          success: true
          failure: true
