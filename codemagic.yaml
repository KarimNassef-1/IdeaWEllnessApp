workflows:
  ios-testflight:
    name: iOS TestFlight Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Create this in Codemagic: Teams > Integrations > App Store Connect.
      # The name must match the integration name set in the Codemagic UI.
      app_store_connect: ideawellness
    environment:
      groups:
        # In the Codemagic UI, both CERTIFICATE_PRIVATE_KEY and
        # APP_STORE_APPLE_ID must be added to a variable group named "appstore".
        - appstore
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # CERTIFICATE_PRIVATE_KEY is stored base64-encoded (to survive the
          # Codemagic UI). Decode it back to a proper multi-line PEM.
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/cert_key.pem
          # Sanity check: the decoded file must be a real PEM private key.
          if ! head -1 /tmp/cert_key.pem | grep -q "BEGIN PRIVATE KEY"; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY did not decode to a PEM key."
            echo "First 40 chars of the raw variable were: ${CERTIFICATE_PRIVATE_KEY:0:40}"
            echo "It must contain the BASE64 string, not the raw -----BEGIN...----- key."
            exit 1
          fi
          export CERT_KEY_PEM="$(cat /tmp/cert_key.pem)"
          # Creates a distribution certificate tied to our own private key plus
          # the App Store provisioning profile, using the connected API key.
          app-store-connect fetch-signing-files "com.ideawellness.app" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERT_KEY_PEM \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set build number
        script: |
          # Auto-increments build number using the latest TestFlight build.
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          echo "Using build number $BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
      - name: Build IPA
        script: |
          # API_BASE_URL (set as a Codemagic env var) points the app at the
          # deployed Azure API. It overrides the local/ngrok fallbacks in
          # lib/core/config/api_config.dart via String.fromEnvironment.
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment and set your tester group names to auto-notify external testers:
        # beta_groups:
        #   - Beta Testers
      email:
        recipients:
          - hossam.adel2024@gmail.com
        notify:
          success: true
          failure: true
